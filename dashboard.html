<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Distance Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --success: #10b981;
            --error: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent-color);
            font-weight: 600;
        }

        .sample-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .flow-panel {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            max-height: 240px;
        }

        .flow-panel h2 {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .flow-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .flow-button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .flow-button:hover {
            transform: translateY(-1px);
            border-color: var(--accent-color);
            background: rgba(56, 189, 248, 0.08);
        }

        .flow-button.active {
            border-color: var(--accent-color);
            background: rgba(56, 189, 248, 0.12);
        }

        .flow-button strong {
            font-size: 0.9rem;
        }

        .flow-button p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.35;
        }

        .flow-status {
            min-height: 1rem;
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        .sample-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sample-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-border);
        }

        .sample-item.active {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-color);
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .badge.success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        /* Main Content */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .header-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-card {
            background: var(--glass-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
        .stat-value { font-size: 1.2rem; font-weight: 600; }

        .source-label {
            margin-top: 6px;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        /* Visualization Area */
        .viz-container {
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .viz-header {
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        #cy-main, .cy-proto {
            flex: 1;
            width: 100%;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        .prototypes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .proto-card {
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .proto-card.winner {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
            transform: scale(1.02);
        }

        .proto-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .distance-val { color: var(--accent-color); font-weight: 600; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <aside>
        <h1>GED Visualizer</h1>
        <ul class="sample-list" id="sampleList"></ul>
        <div class="flow-panel">
            <h2>Fluxos rápidos</h2>
            <div class="flow-actions" id="flowActions"></div>
            <div class="flow-status" id="flowStatus"></div>
        </div>
    </aside>

    <main>
        <div class="header-panel">
            <div id="sampleInfo">
                <h2 id="currentId">Select a sample</h2>
                <p id="currentExpected" class="stat-label"></p>
                <p id="dataSource" class="source-label"></p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Result</div>
                    <div id="resultStatus" class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best Distance</div>
                    <div id="bestDist" class="stat-value">-</div>
                </div>
            </div>
        </div>

        <div class="viz-container">
            <div class="viz-header">
                <span>Sample Graph (Input)</span>
                <span id="nodeEdgeCount" style="font-size: 0.8rem; opacity: 0.6;"></span>
            </div>
            <div id="cy-main"></div>
        </div>

        <div class="prototypes-grid" id="protoGrid">
            <!-- Prototype cards generated by JS -->
        </div>
    </main>

    <script>
        const embeddedData = { prototypes: {}, samples: [] };
        let data = embeddedData;
        let dataSourceLabel = 'backend';
        const backendBaseUrl = window.location.port === '8080' ? '' : 'http://127.0.0.1:8080';

        const flows = [
            {
                id: 'generate',
                title: 'Gerar dados',
                description: 'Pede ao backend local para criar um novo dataset e atualizar a visualização.'
            },
            {
                id: 'dataset',
                title: 'Dataset real',
                description: 'Mostra que os dados vieram do protobuf gerado e abre a primeira amostra.'
            },
            {
                id: 'compare',
                title: 'Comparação GED',
                description: 'Destaca a melhor correspondência entre a amostra atual e os protótipos.'
            },
            {
                id: 'demo',
                title: 'Demonstração',
                description: 'Avança para uma amostra com resultado diferente para mostrar o efeito do ruído.'
            },
            {
                id: 'checks',
                title: 'Validação',
                description: 'Resume os checks básicos: distância zero, distância maior entre grafos diferentes e não negatividade.'
            }
        ];
        let activeSampleIndex = 0;

        const cyStyle = [
            { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#38bdf8', 'color': '#fff', 'font-size': '10px', 'width': '20px', 'height': '20px', 'text-valign': 'bottom', 'text-margin-y': '5px' } },
            { selector: 'edge', style: { 'width': 2, 'line-color': '#475569', 'target-arrow-color': '#475569', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(label)', 'font-size': '8px', 'color': '#94a3b8', 'text-rotation': 'autorotate' } }
        ];

        async function loadData() {
            setLoadingState('Loading dataset from local backend...');
            try {
                const response = await fetch(`${backendBaseUrl}/api/dashboard-data`, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                data = await response.json();
                dataSourceLabel = `backend ${backendBaseUrl || window.location.origin}`;
                init();
            } catch (error) {
                showLoadError(`Could not load data from ${backendBaseUrl || window.location.origin}/api/dashboard-data. Start the backend with \"java -cp out app.Main web 8080\".`);
            }
        }

        function init() {
            renderFlows();
            document.getElementById('dataSource').innerText = `Source: ${dataSourceLabel}`;

            const list = document.getElementById('sampleList');
            list.innerHTML = '';
            data.samples.forEach((s, index) => {
                const best = s.results.reduce((min, r) => r.distance < min.distance ? r : min, s.results[0]);
                const isCorrect = best.label === s.expected;
                
                const li = document.createElement('li');
                li.className = 'sample-item';
                li.innerHTML = `
                    <span>${s.id}</span>
                    <span class="badge ${isCorrect ? 'success' : 'error'}">${isCorrect ? 'Match' : 'Miss'}</span>
                `;
                li.onclick = () => selectSample(index, li);
                list.appendChild(li);
                if (index === 0) selectSample(0, li);
            });

            applyFlow('dataset');
        }

        function setLoadingState(message) {
            document.getElementById('currentId').innerText = 'Loading...';
            document.getElementById('currentExpected').innerText = message;
            document.getElementById('dataSource').innerText = '';
            document.getElementById('resultStatus').innerText = '...';
            document.getElementById('bestDist').innerText = '...';
            document.getElementById('nodeEdgeCount').innerText = '';
            document.getElementById('sampleList').innerHTML = '';
            document.getElementById('protoGrid').innerHTML = '';
        }

        function showLoadError(message) {
            document.getElementById('currentId').innerText = 'Backend not connected';
            document.getElementById('currentExpected').innerText = message;
            document.getElementById('dataSource').innerText = '';
            document.getElementById('resultStatus').innerText = '-';
            document.getElementById('bestDist').innerText = '-';
            document.getElementById('nodeEdgeCount').innerText = '';
            document.getElementById('sampleList').innerHTML = '<li class="sample-item"><span>No backend data loaded</span><span class="badge error">Error</span></li>';
            document.getElementById('protoGrid').innerHTML = '<div class="proto-card"><div class="proto-info"><strong>No data</strong><span class="distance-val">-</span></div><p>Start the backend and reload this page.</p></div>';
            document.getElementById('flowStatus').innerText = message;
        }

        function renderFlows() {
            const panel = document.getElementById('flowActions');
            panel.innerHTML = '';

            flows.forEach(flow => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'flow-button';
                button.dataset.flow = flow.id;
                button.innerHTML = `
                    <strong>${flow.title}</strong>
                    <p>${flow.description}</p>
                `;
                button.onclick = () => applyFlow(flow.id);
                panel.appendChild(button);
            });
        }

        function applyFlow(flowId) {
            document.querySelectorAll('.flow-button').forEach(button => button.classList.toggle('active', button.dataset.flow === flowId));

            const status = document.getElementById('flowStatus');
            const selectedSample = data.samples[activeSampleIndex] || data.samples[0];

            if (flowId === 'generate') {
                status.innerText = 'Gerando novos dados no backend local...';
                regenerateData();
                return;
            }

            if (flowId === 'dataset') {
                status.innerText = `Os dados abaixo vieram do ${dataSourceLabel} e refletem o protobuf gerado.`;
                if (data.samples.length > 0) {
                    selectSample(0, document.querySelectorAll('.sample-item')[0]);
                }
                return;
            }

            if (flowId === 'compare') {
                status.innerText = 'A visualização central mostra a amostra selecionada e a comparação real contra os protótipos-base b, d, h e k.';
                if (selectedSample) {
                    selectSample(activeSampleIndex, document.querySelectorAll('.sample-item')[activeSampleIndex]);
                }
                return;
            }

            if (flowId === 'demo') {
                activeSampleIndex = Math.min(4, data.samples.length - 1);
                status.innerText = 'Troquei para uma amostra mais ruidosa para evidenciar a diferença entre esperado e previsto.';
                const sampleItem = document.querySelectorAll('.sample-item')[activeSampleIndex];
                if (sampleItem) {
                    selectSample(activeSampleIndex, sampleItem);
                }
                return;
            }

            if (flowId === 'checks') {
                status.innerText = 'Checks básicos: grafos idênticos têm distância zero, grafos diferentes dão distância maior, e a distância não é negativa.';
                if (data.samples.length > 0) {
                    selectSample(0, document.querySelectorAll('.sample-item')[0]);
                }
            }
        }

        async function regenerateData() {
            const status = document.getElementById('flowStatus');
            try {
                const response = await fetch(`${backendBaseUrl}/api/regenerate?samplesPerClass=5`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                data = await response.json();
                status.innerText = 'Dados atualizados. A visualização foi recarregada com um novo dataset.';
                rebuildSampleList();
                applyFlow('dataset');
            } catch (error) {
                status.innerText = 'Não foi possível gerar novos dados. Verifique se o backend local está rodando.';
            }
        }

        function rebuildSampleList() {
            const list = document.getElementById('sampleList');
            list.innerHTML = '';

            data.samples.forEach((s, index) => {
                const best = s.results.reduce((min, r) => r.distance < min.distance ? r : min, s.results[0]);
                const isCorrect = best.label === s.expected;

                const li = document.createElement('li');
                li.className = 'sample-item';
                li.innerHTML = `
                    <span>${s.id}</span>
                    <span class="badge ${isCorrect ? 'success' : 'error'}">${isCorrect ? 'Match' : 'Miss'}</span>
                `;
                li.onclick = () => selectSample(index, li);
                list.appendChild(li);
            });
        }

        function selectSample(idx, el) {
            activeSampleIndex = idx;
            document.querySelectorAll('.sample-item').forEach(i => i.classList.remove('active'));
            if (el) {
                el.classList.add('active');
            }

            const sample = data.samples[idx];
            if (!sample) {
                return;
            }
            document.getElementById('currentId').innerText = sample.id;
            document.getElementById('currentExpected').innerText = `Expected: ${sample.expected.toUpperCase()}`;
            
            const best = sample.results.reduce((min, r) => r.distance < min.distance ? r : min, sample.results[0]);
            const isCorrect = best.label === sample.expected;
            
            document.getElementById('resultStatus').innerText = best.label.toUpperCase();
            document.getElementById('resultStatus').style.color = isCorrect ? 'var(--success)' : 'var(--error)';
            document.getElementById('bestDist').innerText = best.distance.toFixed(4);
            document.getElementById('nodeEdgeCount').innerText = `${sample.graph.nodes.length} nodes, ${sample.graph.edges.length} edges`;

            renderMainGraph(sample.graph);
            renderPrototypes(sample.results);
        }

        function renderMainGraph(graphData) {
            cytoscape({
                container: document.getElementById('cy-main'),
                elements: [
                    ...graphData.nodes.map(n => ({ data: { id: n.id, label: n.label } })),
                    ...graphData.edges.map((e, i) => ({ data: { id: 'e' + i, source: e.source, target: e.target, label: e.label } }))
                ],
                style: cyStyle,
                layout: { name: 'cose', padding: 30 }
            });
        }

        function renderPrototypes(results) {
            const grid = document.getElementById('protoGrid');
            grid.innerHTML = '';
            
            const bestDist = Math.min(...results.map(r => r.distance));

            results.forEach(res => {
                const proto = data.prototypes[res.label];
                const card = document.createElement('div');
                card.className = `proto-card ${res.distance === bestDist ? 'winner' : ''}`;
                
                const cyId = `cy-proto-${res.label}`;
                card.innerHTML = `
                    <div class="proto-info">
                        <strong>Prototype ${res.label.toUpperCase()}</strong>
                        <span class="distance-val">${res.distance.toFixed(4)}</span>
                    </div>
                    <div id="${cyId}" class="cy-proto" style="height: 150px;"></div>
                `;
                grid.appendChild(card);

                cytoscape({
                    container: document.getElementById(cyId),
                    elements: [
                        ...proto.nodes.map(n => ({ data: { id: n.id, label: n.label } })),
                        ...proto.edges.map((e, i) => ({ data: { id: 'e' + i, source: e.source, target: e.target, label: e.label } }))
                    ],
                    style: cyStyle,
                    layout: { name: 'circle', padding: 10 },
                    userZoomingEnabled: false,
                    userPanningEnabled: false
                });
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
