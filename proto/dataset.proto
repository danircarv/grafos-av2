syntax = "proto3";

package graphdataset;

message Node {
  int32 id = 1;
  string label = 2;
}

message Edge {
  int32 source_id = 1;
  int32 target_id = 2;
  string label = 3;
}

message GraphSample {
  repeated Node nodes = 1;
  repeated Edge edges = 2;
  string class_label = 3;
  double noise_level = 4;
}

message Dataset {
  repeated GraphSample samples = 1;
}